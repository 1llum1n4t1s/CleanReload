<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 800px;
    background: linear-gradient(160deg, #F3E5F5 0%, #E1BEE7 50%, #CE93D8 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', 'Yu Gothic UI', 'Meiryo', sans-serif;
    overflow: hidden;
  }
  .container {
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 48px;
  }
  .heading {
    font-size: 48px; font-weight: 800; color: #6A1B9A;
  }
  .steps {
    display: flex; gap: 48px;
  }
  .step {
    background: rgba(255,255,255,0.85);
    border-radius: 24px;
    padding: 40px 36px;
    width: 320px;
    box-shadow: 0 8px 32px rgba(106,27,154,0.12);
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }
  .step-num {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #AB47BC, #7B1FA2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 800; color: white;
  }
  .step-icon {
    font-size: 64px;
  }
  .step-title {
    font-size: 24px; font-weight: 700; color: #4A148C;
  }
  .step-desc {
    font-size: 18px; color: #6A1B9A; line-height: 1.6;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="heading">使い方はかんたん</div>
    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-icon">🔧</div>
        <div class="step-title">拡張機能を追加</div>
        <div class="step-desc">Chrome Web Storeから<br>インストール</div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-icon">🖱️</div>
        <div class="step-title">アイコンをクリック</div>
        <div class="step-desc">ツールバーのアイコンを<br>クリックするだけ</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-icon">✨</div>
        <div class="step-title">完全リロード</div>
        <div class="step-desc">SW・Cache・HTTPキャッシュを<br>すべてクリアして再読み込み</div>
      </div>
    </div>
  </div>
</body>
</html>
